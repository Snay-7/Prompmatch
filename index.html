<!DOCTYPE html>
<html lang="en">
<head>

<title>PropMatch Network</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0B1728;--navy2:#152238;--blue:#1A4F8A;--accent:#2D7DD2;--gold:#C9A84C;--gold2:#E8C96E;--green:#1A7A4A;--green-light:#E8F5EE;--red:#C0392B;--red-light:#FDECEA;--amber:#D35400;--amber-light:#FEF3E8;--border:#2A3A52;--card:#13203A;--text:#E8EDF5;--text2:#9AAFC8;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto;transition:transform 0.25s ease}
.main{margin-left:240px;flex:1;min-height:100vh}
.sidebar-overlay{display:none;position:fixed;inset:0;background:#000000aa;z-index:150}
.logo{padding:24px 24px 16px;border-bottom:1px solid var(--border)}
.logo-text{font-family:'DM Serif Display',serif;font-size:20px;color:var(--gold)}
.logo-sub{font-size:9px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.db-indicator{display:flex;align-items:center;gap:6px;margin-top:8px}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.db-dot.live{background:var(--green);animation:pulse 2s infinite}
.db-label{font-size:10px;color:var(--amber)}.db-label.live{color:var(--green)}
.nav{padding:16px 12px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.15s;margin-bottom:2px}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,#1A4F8A22,#2D7DD222);color:var(--gold);border:1px solid #2D7DD230}
.nav-icon{font-size:15px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600}.user-role{font-size:10px;color:var(--text2)}
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.menu-btn{display:none;background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px}
.page-title{font-family:'DM Serif Display',serif;font-size:18px}
.page-sub{font-size:11px;color:var(--text2);margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--blue));color:#fff}
.btn-primary:hover{opacity:0.9}.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border:1px solid #C0392B44}
.btn-danger:hover{background:var(--red-light)}
.btn-success{background:var(--green);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
.content{padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.stat-value{font-family:'DM Serif Display',serif;font-size:28px;line-height:1}
.stat-sub{font-size:11px;margin-top:6px;padding:2px 8px;border-radius:20px;display:inline-block}
.stat-sub.up{background:var(--green-light);color:var(--green)}.stat-sub.amber{background:var(--amber-light);color:var(--amber)}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'DM Serif Display',serif;font-size:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{padding:13px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.table{width:100%;border-collapse:collapse;min-width:500px}
.table th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
.table td{padding:10px 12px;border-bottom:1px solid #1E2F48;font-size:13px;vertical-align:middle}
.table tr:last-child td{border-bottom:none}.table tr:hover td{background:#ffffff04}
.tag{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-blue{background:#1A4F8A22;color:#5B9FE0;border:1px solid #1A4F8A44}
.tag-green{background:var(--green-light);color:var(--green)}
.tag-amber{background:var(--amber-light);color:var(--amber)}
.tag-gold{background:#C9A84C18;color:var(--gold2);border:1px solid #C9A84C33}
.tag-muted{background:#ffffff0f;color:var(--text2)}
.tag-red{background:var(--red-light);color:var(--red)}
.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.p-col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.p-col-head{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.p-count{background:var(--navy2);font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px}
.deal-chip{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:all 0.15s}
.deal-chip:hover{border-color:var(--accent)}
.dc-title{font-size:12px;font-weight:600;margin-bottom:3px}
.dc-meta{font-size:11px;color:var(--text2)}
.dc-price{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold);margin-top:4px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}.fg.full{grid-column:1/-1}
.fl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);font-weight:500}
.fi{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;width:100%}
.fi:focus{border-color:var(--accent)}.fi option{background:var(--navy2)}.fi-ta{resize:vertical;min-height:75px}
.match-row{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:7px;cursor:pointer;transition:all 0.15s}
.match-row:hover{border-color:var(--accent)}
.match-row.selected{border-color:var(--green);background:#1A7A4A15}
.match-checkbox{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.viewing-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.vdate{border-radius:8px;padding:7px 10px;text-align:center;min-width:46px}
.vday{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;line-height:1}
.vmon{font-size:9px;color:#ffffffaa;text-transform:uppercase;letter-spacing:1px}
.vinfo{flex:1;min-width:0}
.vtitle{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vsub{font-size:11px;color:var(--text2);margin-top:1px}
.progress-bar{height:4px;background:#ffffff10;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.flow{display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.f-step{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:11px;font-weight:600;text-align:center}
.f-step.done{border-color:var(--green);color:var(--green);background:var(--green-light)}
.f-step.active{border-color:var(--gold);color:var(--gold);background:#C9A84C12}
.f-arrow{color:var(--accent);font-size:14px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.screen{animation:fadeIn 0.2s ease}
.empty{text-align:center;padding:36px;color:var(--text2)}
.empty .ico{font-size:32px;margin-bottom:10px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:var(--text2)}
#toast-wrap{position:fixed;bottom:20px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;animation:fadeIn 0.2s ease;max-width:280px}
.toast.ok{border-color:var(--green);color:var(--green)}.toast.err{border-color:var(--red);color:var(--red)}.toast.info{border-color:var(--accent);color:var(--accent)}
#modal-wrap{position:fixed;inset:0;background:#000000bb;z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:14px 14px 0 0;padding:24px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:18px}
.send-log{background:var(--navy);border:1px solid var(--border);border-radius:8px;padding:12px;height:150px;overflow-y:auto;font-family:'DM Mono',monospace;font-size:11px;margin-top:12px}
.send-log-line{margin-bottom:4px;line-height:1.5}
.send-log-line.ok{color:#4CAF81}.send-log-line.err{color:#E57373}.send-log-line.info{color:var(--accent)}
.select-all-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--navy);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy2);border-top:1px solid var(--border);z-index:190;padding:8px 0 env(safe-area-inset-bottom,0px)}
.bottom-nav-items{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;cursor:pointer;color:var(--text2);font-size:10px;font-weight:500;min-width:48px}
.bn-item.active{color:var(--gold)}.bn-icon{font-size:18px}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}.main{margin-left:0;padding-bottom:70px}
  .menu-btn{display:block}.stats-grid{grid-template-columns:1fr 1fr}
  .pipeline{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}
  .form-grid-3{grid-template-columns:1fr 1fr}.fg.full{grid-column:1/-1}
  .hide-mobile{display:none}.bottom-nav{display:block}
  .topbar-right .btn-ghost:not(.keep){display:none}
  .modal{border-radius:14px 14px 0 0;max-height:88vh}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr 1fr}.pipeline{grid-template-columns:1fr}.content{padding:14px}.topbar{padding:0 14px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>

<script>

const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50amlmemhyaGF6eWJycW96a2loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjg0NjYsImV4cCI6MjA4OTg0NDQ2Nn0.nA0WOhuBnA4yBz2Dz61ByjCK8xf_v3WVWpOvwZX-YoQ';

const REPLY_TO='snayder@nestseekers.com';
const sb=supabase.createClient(SB_URL,SB_KEY);

const S={screen:'dashboard',deals:[],investors:[],viewings:[],matchResult:null,loading:true,dbLive:false,editDeal:null,editInvestor:null,
newDeal:{title:'',asset_type:'',location:'',country:'',price:'',min_investment:'',expected_yield:'',target_irr:'',deal_stage:'',finance_type:'',summary:''}};

// ── SIDEBAR ───────────────────────────────────────────────────────
function openSidebar(){document.querySelector('.sidebar')?.classList.add('open');document.getElementById('overlay').classList.add('open');}
function closeSidebar(){document.querySelector('.sidebar')?.classList.remove('open');document.getElementById('overlay').classList.remove('open');}

// ── EMAIL via Netlify Function ────────────────────────────────────
function buildEmailHTML(deal,investor){
  const price=deal.price?'£'+Number(deal.price).toLocaleString():'—';
  const yld=deal.expected_yield?deal.expected_yield+'%':'—';
  const irr=deal.target_irr?deal.target_irr+'%':'—';
  const firstName=investor.name.split(' ')[0];
  return`<!DOCTYPE html><html><head><meta charset="UTF-8"/></head><body style="margin:0;padding:0;background:#f4f4f4;font-family:'Helvetica Neue',Arial,sans-serif"><table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:32px 0"><tr><td align="center"><table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08)"><tr><td style="background:#0B1728;padding:24px 28px"><div style="font-family:Georgia,serif;font-size:20px;color:#C9A84C">PropMatch Network</div><div style="font-size:10px;color:#9AAFC8;letter-spacing:2px;text-transform:uppercase;margin-top:4px">New Deal Alert</div></td></tr><tr><td style="padding:28px"><p style="font-size:15px;color:#1A1A2E;margin:0 0 14px">Hi ${firstName},</p><p style="font-size:14px;color:#444;line-height:1.6;margin:0 0 20px">I wanted to share a new opportunity that matches your investment profile.</p><div style="background:#F8F9FF;border-left:4px solid #2D7DD2;border-radius:6px;padding:14px 16px;margin-bottom:20px"><div style="font-family:Georgia,serif;font-size:18px;color:#0B1728;margin-bottom:4px">${deal.title}</div><div style="font-size:12px;color:#888">${deal.location||''}${deal.country?', '+deal.country:''} · ${deal.asset_type||''} · ${deal.deal_stage||''}</div></div><table width="100%" cellpadding="0" cellspacing="4" style="margin-bottom:20px"><tr><td width="23%" style="text-align:center;padding:12px 6px;background:#F8F9FF;border-radius:8px"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Price</div><div style="font-family:Georgia,serif;font-size:15px;color:#0B1728;font-weight:bold">${price}</div></td><td width="4%"></td><td width="23%" style="text-align:center;padding:12px 6px;background:#F8F9FF;border-radius:8px"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Yield</div><div style="font-family:Georgia,serif;font-size:15px;color:#1A7A4A;font-weight:bold">${yld}</div></td><td width="4%"></td><td width="23%" style="text-align:center;padding:12px 6px;background:#F8F9FF;border-radius:8px"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">IRR</div><div style="font-family:Georgia,serif;font-size:15px;color:#1A4F8A;font-weight:bold">${irr}</div></td><td width="4%"></td><td width="23%" style="text-align:center;padding:12px 6px;background:#F8F9FF;border-radius:8px"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Finance</div><div style="font-family:Georgia,serif;font-size:13px;color:#0B1728;font-weight:bold">${deal.finance_type||'Flexible'}</div></td></tr></table>${deal.summary?`<p style="font-size:14px;color:#444;line-height:1.7;margin:0 0 20px">${deal.summary}</p>`:''}<div style="background:#0B1728;border-radius:10px;padding:18px;text-align:center;margin-bottom:20px"><p style="color:#E8EDF5;font-size:14px;margin:0 0 12px">If this is of interest, reply <strong style="color:#C9A84C">YES</strong> to this email.</p><a href="mailto:${REPLY_TO}?subject=YES - ${deal.title}" style="background:linear-gradient(135deg,#2D7DD2,#1A4F8A);color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;display:inline-block">Reply YES →</a></div></td></tr><tr><td style="background:#F8F9FF;padding:16px 28px;border-top:1px solid #eee"><div style="font-size:13px;color:#333;font-weight:600">Snayder Andrade</div><div style="font-size:11px;color:#888">Nest Seekers International · The Property Source Group Ltd</div><div style="font-size:11px;color:#2D7DD2;margin-top:2px">${REPLY_TO}</div><div style="font-size:10px;color:#bbb;margin-top:8px">© PropMatch Network · <a href="mailto:${REPLY_TO}?subject=Unsubscribe" style="color:#bbb">Unsubscribe</a></div></td></tr></table></td></tr></table></body></html>`;
}

async function sendViaFunction(to,toName,subject,html){
  const res=await fetch('/.netlify/functions/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to,toName,subject,html})});
  const data=await res.json();
  if(!res.ok) throw new Error(data.error||'Send failed');
  return data;
}

async function distributeEmails(dealId,selected){
  const deal=S.deals.find(d=>d.id===dealId); if(!deal) return;
  showModal(`<div class="modal-title">✉ Sending Deal Alert</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:4px">Deal: <strong style="color:var(--text)">${deal.title}</strong></div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px">Sending to ${selected.length} selected investors from ${FROM_EMAIL}</div>
    <div><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span id="spl">Preparing...</span><span id="spp">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="sp" style="width:0%"></div></div></div>
    <div class="send-log" id="send-log"></div>
    <div style="margin-top:14px"><button class="btn btn-ghost" id="cls-btn" onclick="closeModal();fetchAll();render()" disabled>Close</button></div>`);
  function log(msg,type='info'){const el=document.getElementById('send-log');if(!el)return;const d=document.createElement('div');d.className='send-log-line '+type;d.textContent='['+new Date().toLocaleTimeString()+'] '+msg;el.appendChild(d);el.scrollTop=el.scrollHeight;}
  let sent=0,failed=0;
  log('Starting send to '+selected.length+' investors...','info');
  for(let i=0;i<selected.length;i++){
    const inv=selected[i];
    if(!inv.email){log('⚠ Skipped '+inv.name+' — no email on file','err');failed++;}
    else{
      try{
        const subject='New Deal Alert — '+deal.title+(deal.location?' | '+deal.location:'');
        await sendViaFunction(inv.email,inv.name,subject,buildEmailHTML(deal,inv));
        sent++;log('✓ Sent to '+inv.name+' ('+inv.email+')','ok');
      }catch(e){failed++;log('✗ Failed '+inv.name+': '+e.message,'err');}
    }
    const pct=Math.round(((i+1)/selected.length)*100);
    const sp=document.getElementById('sp');const spp=document.getElementById('spp');const spl=document.getElementById('spl');
    if(sp)sp.style.width=pct+'%';if(spp)spp.textContent=pct+'%';if(spl)spl.textContent=(i+1)+' of '+selected.length;
    await new Promise(r=>setTimeout(r,300));
  }
  log('Complete. '+sent+' sent, '+failed+' failed.', sent>0?'ok':'err');
  const cb=document.getElementById('cls-btn');if(cb)cb.disabled=false;
  if(sent>0){await updateDealStatus(dealId,'Distributed',sent);toast('✉ '+sent+' emails sent','ok');}
}

async function fetchAll(){S.loading=true;render();const[d,i,v]=await Promise.all([sb.from('deals').select('*').order('created_at',{ascending:false}),sb.from('investors').select('*').order('created_at',{ascending:false}),sb.from('viewings').select('*').order('viewing_date',{ascending:true})]);S.deals=d.data||[];S.investors=i.data||[];S.viewings=v.data||[];S.dbLive=!d.error&&!i.error;S.loading=false;render();}
async function saveDeal(deal){const{data,error}=await sb.from('deals').insert([deal]).select();if(error){toast('Error: '+error.message,'err');return null;}toast('Deal saved ✓','ok');return data[0];}
async function updateDeal(id,deal){const{error}=await sb.from('deals').update(deal).eq('id',id);if(error){toast('Error: '+error.message,'err');return false;}toast('Deal updated ✓','ok');return true;}
async function deleteDeal(id){await sb.from('deals').delete().eq('id',id);toast('Deleted','ok');await fetchAll();}
async function saveInvestor(inv){const{data,error}=await sb.from('investors').insert([inv]).select();if(error){toast('Error: '+error.message,'err');return null;}toast('Investor added ✓','ok');return data[0];}
async function updateInvestor(id,inv){const{error}=await sb.from('investors').update(inv).eq('id',id);if(error){toast('Error: '+error.message,'err');return false;}toast('Investor updated ✓','ok');return true;}
async function deleteInvestor(id){await sb.from('investors').delete().eq('id',id);toast('Removed','ok');await fetchAll();}
async function saveViewing(v){const{data,error}=await sb.from('viewings').insert([v]).select();if(error){toast('Error: '+error.message,'err');return null;}toast('Viewing scheduled ✓','ok');return data[0];}
async function updateViewing(id,status){await sb.from('viewings').update({status}).eq('id',id);await fetchAll();}
async function updateDealStatus(id,status,investors_matched){const u={status};if(investors_matched!==undefined)u.investors_matched=investors_matched;await sb.from('deals').update(u).eq('id',id);await fetchAll();}

// ── MATCHING ──────────────────────────────────────────────────────
function matchInvestors(deal){return S.investors.filter(inv=>{if(inv.status!=='Active')return false;const assets=Array.isArray(inv.asset_preference)?inv.asset_preference:(inv.asset_preference||'').split(',').map(s=>s.trim()).filter(Boolean);const geos=Array.isArray(inv.geography)?inv.geography:(inv.geography||'').split(',').map(s=>s.trim()).filter(Boolean);if(deal.asset_type&&assets.length&&!assets.some(a=>a.toLowerCase().includes(deal.asset_type.toLowerCase())||deal.asset_type.toLowerCase().includes(a.toLowerCase())))return false;if(deal.country&&geos.length&&!geos.some(g=>g.toLowerCase().includes(deal.country.toLowerCase())||deal.country.toLowerCase().includes(g.toLowerCase())))return false;const price=parseFloat(deal.price)||0;if(price&&inv.min_investment&&price<inv.min_investment)return false;if(price&&inv.max_investment&&price>inv.max_investment)return false;const yld=parseFloat(deal.expected_yield)||0;if(yld&&inv.min_yield&&yld<inv.min_yield)return false;return true;});}

// ── HELPERS ───────────────────────────────────────────────────────
const fmt=n=>n?'£'+Number(n).toLocaleString():'—';
function tagCls(s){return{New:'tag-amber',Matched:'tag-gold',Distributed:'tag-blue',Viewing:'tag-green',Completed:'tag-muted',Active:'tag-green',Paused:'tag-amber','Do Not Contact':'tag-red',Confirmed:'tag-green',Pending:'tag-amber','Slots Requested':'tag-muted'}[s]||'tag-muted';}
function fmtDate(d){if(!d)return{day:'—',mon:'—'};const dt=new Date(d);return{day:dt.getDate(),mon:dt.toLocaleString('default',{month:'short'}).toUpperCase()};}
function initials(n){return(n||'').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}
function toast(msg,type='ok'){const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;document.getElementById('toast-wrap').appendChild(el);setTimeout(()=>el.remove(),4000);}
function closeModal(){const m=document.getElementById('modal-wrap');if(m)m.remove();}
function showModal(html){closeModal();const d=document.createElement('div');d.id='modal-wrap';d.innerHTML='<div class="modal">'+html+'</div>';d.addEventListener('click',e=>{if(e.target===d)closeModal();});document.body.appendChild(d);}

// Selected investors tracking
let _selectedIds=new Set();
let _currentMatchDeal=null;
let _currentMatched=[];

function toggleRow(i,invId){
  const cb=document.getElementById('cb-'+i);
  const row=document.getElementById('mr-'+i);
  if(!cb||cb.disabled)return;
  cb.checked=!cb.checked;
  if(cb.checked){row.classList.add('selected');_selectedIds.add(invId);}
  else{row.classList.remove('selected');_selectedIds.delete(invId);}
  const sel=document.getElementById('sel-count');
  if(sel)sel.textContent=_selectedIds.size+' selected';
}

function toggleAll(checked){
  _currentMatched.forEach((inv,i)=>{
    if(!inv.email)return;
    const cb=document.getElementById('cb-'+i);
    const row=document.getElementById('mr-'+i);
    if(!cb)return;
    cb.checked=checked;
    if(checked){row.classList.add('selected');_selectedIds.add(inv.id);}
    else{row.classList.remove('selected');_selectedIds.delete(inv.id);}
  });
  const sel=document.getElementById('sel-count');
  if(sel)sel.textContent=_selectedIds.size+' selected';
}

async function sendSelected(){
  if(_selectedIds.size===0){toast('No investors selected','err');return;}
  if(!_currentMatchDeal){toast('No deal selected','err');return;}
  const selected=_currentMatched.filter(inv=>_selectedIds.has(inv.id)&&inv.email);
  if(selected.length===0){toast('Selected investors have no email addresses','err');return;}
  await distributeEmails(_currentMatchDeal,selected);
}

function readForm(){return{title:document.getElementById('f-title')?.value.trim()||'',asset_type:document.getElementById('f-type')?.value||'',deal_stage:document.getElementById('f-stage')?.value||'',location:document.getElementById('f-loc')?.value.trim()||'',country:document.getElementById('f-country')?.value||'',price:parseFloat(document.getElementById('f-price')?.value)||null,expected_yield:parseFloat(document.getElementById('f-yield')?.value)||null,target_irr:parseFloat(document.getElementById('f-irr')?.value)||null,finance_type:document.getElementById('f-finance')?.value||'',summary:document.getElementById('f-summary')?.value.trim()||''};}

function runMatchForm(){
  const deal=readForm();
  S.matchResult=matchInvestors(deal);
  _currentMatched=S.matchResult;
  _selectedIds=new Set(S.matchResult.filter(i=>i.email).map(i=>i.id));
  _currentMatchDeal=null; // will save on send
  render();
}

    <div class="send-log" id="imp-log"></div>

      <button class="btn btn-primary" id="imp-btn" onclick="runBulkImport()">▶ Import All 32</button>

async function runBulkImport(){
  document.getElementById('imp-btn').disabled=true;
  function log(msg,type='info'){const el=document.getElementById('imp-log');if(!el)return;const d=document.createElement('div');d.className='send-log-line '+type;d.textContent='['+new Date().toLocaleTimeString()+'] '+msg;el.appendChild(d);el.scrollTop=el.scrollHeight;}
  let ok=0,fail=0;
  log('Importing '+INVESTORS_DATA.length+' investors...','info');
  for(let i=0;i<INVESTORS_DATA.length;i++){
    try{const{error}=await sb.from('investors').insert([INVESTORS_DATA[i]]);if(error)throw error;ok++;log('✓ '+INVESTORS_DATA[i].name,'ok');}
    catch(e){fail++;log('✗ '+INVESTORS_DATA[i].name+': '+e.message,'err');}
    const pct=Math.round(((i+1)/INVESTORS_DATA.length)*100);
    const p=document.getElementById('imp-prog');const pp=document.getElementById('imp-pct');const pl=document.getElementById('imp-lbl');
    if(p)p.style.width=pct+'%';if(pp)pp.textContent=pct+'%';if(pl)pl.textContent=(i+1)+' of '+INVESTORS_DATA.length;
    await new Promise(r=>setTimeout(r,120));
  }
  log('Done. '+ok+' imported, '+fail+' skipped.',ok>0?'ok':'err');
  const cb=document.getElementById('imp-close');if(cb)cb.disabled=false;
  toast(ok+' investors imported ✓','ok');
}

  </div></div>`;
}

function runMatchDeal(id){
  const deal=S.deals.find(d=>d.id===id);if(!deal)return;
  const matched=matchInvestors(deal);
  _currentMatchDeal=id;
  _currentMatched=matched;
  _selectedIds=new Set(matched.filter(i=>i.email).map(i=>i.id));
  const panel=document.getElementById('match-results');if(!panel)return;
  panel.innerHTML=`<div class="card" style="margin-top:16px"><div class="card-head"><span>Results — ${matched.length} investors match</span><span style="font-size:12px;color:var(--green);font-weight:500">${matched.filter(i=>i.email).length} with email</span></div><div class="card-body">
    ${matched.length===0?'<div class="empty" style="padding:20px"><div class="ico">🔍</div><p>No matches. Try a different deal or add more investors.</p></div>':`
    <div class="select-all-bar"><span id="sel-count-m">${matched.filter(i=>i.email).length} selected</span><div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="toggleAllMatch(true)">Select All</button><button class="btn btn-ghost btn-sm" onclick="toggleAllMatch(false)">Deselect All</button></div></div>
    ${matched.map((inv,i)=>`<div class="match-row ${inv.email?'selected':''}" id="mmr-${i}" onclick="toggleMatchRow(${i},'${inv.id}')"><input type="checkbox" class="match-checkbox" id="mcb-${i}" ${inv.email?'checked':''} ${!inv.email?'disabled':''} onclick="event.stopPropagation();toggleMatchRow(${i},'${inv.id}')"/><div style="flex:1"><div style="font-weight:600;font-size:13px">${inv.name}</div><div style="font-size:11px;color:var(--text2)">${inv.investor_type||''} · ${inv.email||'No email'}</div></div><span class="tag ${inv.email?'tag-green':'tag-amber'}">${inv.email?'✓ Email':'No email'}</span></div>`).join('')}
    <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="sendMatchSelected()">✉ Send to Selected Investors</button>`}
  </div></div>`;
}

function toggleMatchRow(i,invId){
  const cb=document.getElementById('mcb-'+i);const row=document.getElementById('mmr-'+i);
  if(!cb||cb.disabled)return;
  cb.checked=!cb.checked;
  if(cb.checked){row.classList.add('selected');_selectedIds.add(invId);}
  else{row.classList.remove('selected');_selectedIds.delete(invId);}
  const sel=document.getElementById('sel-count-m');
  if(sel)sel.textContent=_selectedIds.size+' selected';
}

function toggleAllMatch(checked){
  _currentMatched.forEach((inv,i)=>{
    if(!inv.email)return;
    const cb=document.getElementById('mcb-'+i);const row=document.getElementById('mmr-'+i);
    if(!cb)return;
    cb.checked=checked;
    if(checked){row.classList.add('selected');_selectedIds.add(inv.id);}
    else{row.classList.remove('selected');_selectedIds.delete(inv.id);}
  });
  const sel=document.getElementById('sel-count-m');
  if(sel)sel.textContent=_selectedIds.size+' selected';
}

async function sendMatchSelected(){
  if(_selectedIds.size===0){toast('No investors selected','err');return;}
  const selected=_currentMatched.filter(inv=>_selectedIds.has(inv.id)&&inv.email);
  if(selected.length===0){toast('No emails available for selected investors','err');return;}
  await distributeEmails(_currentMatchDeal,selected);
}
