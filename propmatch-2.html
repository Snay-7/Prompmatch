<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PropMatch Network</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0B1728;--navy2:#152238;--blue:#1A4F8A;--accent:#2D7DD2;--gold:#C9A84C;--gold2:#E8C96E;--green:#1A7A4A;--green-light:#E8F5EE;--red:#C0392B;--red-light:#FDECEA;--amber:#D35400;--amber-light:#FEF3E8;--border:#2A3A52;--card:#13203A;--text:#E8EDF5;--text2:#9AAFC8;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.main{margin-left:240px;flex:1;min-height:100vh}
.logo{padding:24px 24px 16px;border-bottom:1px solid var(--border)}
.logo-text{font-family:'DM Serif Display',serif;font-size:20px;color:var(--gold)}
.logo-sub{font-size:9px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.db-indicator{display:flex;align-items:center;gap:6px;margin-top:8px}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.db-dot.live{background:var(--green);animation:pulse 2s infinite}
.db-label{font-size:10px;color:var(--amber)}
.db-label.live{color:var(--green)}
.nav{padding:16px 12px;flex:1}
.nav-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);padding:10px 12px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.15s;margin-bottom:2px}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,#1A4F8A22,#2D7DD222);color:var(--gold);border:1px solid #2D7DD230}
.nav-icon{font-size:15px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:var(--text)}
.user-role{font-size:10px;color:var(--text2)}
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-family:'DM Serif Display',serif;font-size:20px}
.page-sub{font-size:12px;color:var(--text2);margin-top:1px}
.topbar-right{display:flex;gap:10px;align-items:center}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--blue));color:#fff}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border:1px solid #C0392B44}
.btn-danger:hover{background:var(--red-light)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}
.content{padding:28px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.stat-value{font-family:'DM Serif Display',serif;font-size:30px;color:var(--text);line-height:1}
.stat-sub{font-size:11px;margin-top:6px;padding:2px 8px;border-radius:20px;display:inline-block}
.stat-sub.up{background:var(--green-light);color:var(--green)}
.stat-sub.amber{background:var(--amber-light);color:var(--amber)}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:'DM Serif Display',serif;font-size:17px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14px}
.card-body{padding:18px}
.table{width:100%;border-collapse:collapse}
.table th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);padding:9px 14px;text-align:left;border-bottom:1px solid var(--border)}
.table td{padding:11px 14px;border-bottom:1px solid #1E2F48;font-size:13px;vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:#ffffff04}
.tag{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-blue{background:#1A4F8A22;color:#5B9FE0;border:1px solid #1A4F8A44}
.tag-green{background:var(--green-light);color:var(--green)}
.tag-amber{background:var(--amber-light);color:var(--amber)}
.tag-gold{background:#C9A84C18;color:var(--gold2);border:1px solid #C9A84C33}
.tag-muted{background:#ffffff0f;color:var(--text2)}
.tag-red{background:var(--red-light);color:var(--red)}
.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.p-col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.p-col-head{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.p-count{background:var(--navy2);color:var(--text);font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px}
.deal-chip{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:all 0.15s}
.deal-chip:hover{border-color:var(--accent);transform:translateY(-1px)}
.dc-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.dc-meta{font-size:11px;color:var(--text2)}
.dc-price{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold);margin-top:4px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);font-weight:500}
.fi{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;width:100%}
.fi:focus{border-color:var(--accent)}
.fi option{background:var(--navy2)}
.fi-ta{resize:vertical;min-height:75px}
.match-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.viewing-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:9px;display:flex;align-items:center;gap:14px}
.vdate{border-radius:8px;padding:7px 10px;text-align:center;min-width:48px;background:var(--accent)}
.vday{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;line-height:1}
.vmon{font-size:9px;color:#ffffffaa;text-transform:uppercase;letter-spacing:1px}
.vinfo{flex:1}
.vtitle{font-size:13px;font-weight:600}
.vsub{font-size:11px;color:var(--text2);margin-top:1px}
.progress-bar{height:4px;background:#ffffff10;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.flow{display:flex;align-items:center;flex-wrap:wrap;gap:0}
.f-step{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:11px;font-weight:600;text-align:center}
.f-step.done{border-color:var(--green);color:var(--green);background:var(--green-light)}
.f-step.active{border-color:var(--gold);color:var(--gold);background:#C9A84C12}
.f-arrow{color:var(--accent);padding:0 5px;font-size:16px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.screen{animation:fadeIn 0.2s ease}
.empty{text-align:center;padding:40px;color:var(--text2)}
.empty .ico{font-size:36px;margin-bottom:10px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:var(--text2)}
#toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;animation:fadeIn 0.2s ease;max-width:280px}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
#modal-wrap{position:fixed;inset:0;background:#000000bb;z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:24px;width:480px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:18px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="toast-wrap"></div>
<script>
const SB_URL='https://ntjifzhrhazybrqozkih.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50amlmemhyaGF6eWJycW96a2loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjg0NjYsImV4cCI6MjA4OTg0NDQ2Nn0.nA0WOhuBnA4yBz2Dz61ByjCK8xf_v3WVWpOvwZX-YoQ';
const sb=supabase.createClient(SB_URL,SB_KEY);
const S={screen:'dashboard',deals:[],investors:[],viewings:[],matchResult:null,loading:true,dbLive:false,newDeal:{title:'',asset_type:'',location:'',country:'',price:'',min_investment:'',expected_yield:'',target_irr:'',deal_stage:'',finance_type:'',summary:''}};
async function fetchAll(){S.loading=true;render();const[d,i,v]=await Promise.all([sb.from('deals').select('*').order('created_at',{ascending:false}),sb.from('investors').select('*').order('created_at',{ascending:false}),sb.from('viewings').select('*').order('viewing_date',{ascending:true})]);S.deals=d.data||[];S.investors=i.data||[];S.viewings=v.data||[];S.dbLive=!d.error&&!i.error;S.loading=false;render();}
async function saveDeal(deal){const{data,error}=await sb.from('deals').insert([deal]).select();if(error){toast('Error: '+error.message,'err');return null;}toast('Deal saved ✓','ok');return data[0];}
async function deleteDeal(id){await sb.from('deals').delete().eq('id',id);toast('Deleted','ok');await fetchAll();}
async function saveInvestor(inv){const{data,error}=await sb.from('investors').insert([inv]).select();if(error){toast('Error: '+error.message,'err');return null;}toast('Investor added ✓','ok');return data[0];}
async function deleteInvestor(id){await sb.from('investors').delete().eq('id',id);toast('Removed','ok');await fetchAll();}
async function saveViewing(v){const{data,error}=await sb.from('viewings').insert([v]).select();if(error){toast('Error: '+error.message,'err');return null;}toast('Viewing scheduled ✓','ok');return data[0];}
async function updateViewing(id,status){await sb.from('viewings').update({status}).eq('id',id);await fetchAll();}
async function updateDealStatus(id,status,investors_matched){const u={status};if(investors_matched!==undefined)u.investors_matched=investors_matched;await sb.from('deals').update(u).eq('id',id);await fetchAll();}
function matchInvestors(deal){return S.investors.filter(inv=>{if(inv.status!=='Active')return false;const assets=Array.isArray(inv.asset_preference)?inv.asset_preference:(inv.asset_preference||'').split(',').map(s=>s.trim()).filter(Boolean);const geos=Array.isArray(inv.geography)?inv.geography:(inv.geography||'').split(',').map(s=>s.trim()).filter(Boolean);if(deal.asset_type&&assets.length&&!assets.some(a=>a.toLowerCase().includes(deal.asset_type.toLowerCase())||deal.asset_type.toLowerCase().includes(a.toLowerCase())))return false;if(deal.country&&geos.length&&!geos.some(g=>g.toLowerCase().includes(deal.country.toLowerCase())||deal.country.toLowerCase().includes(g.toLowerCase())))return false;const price=parseFloat(deal.price)||0;if(price&&inv.min_investment&&price<inv.min_investment)return false;if(price&&inv.max_investment&&price>inv.max_investment)return false;const yld=parseFloat(deal.expected_yield)||0;if(yld&&inv.min_yield&&yld<inv.min_yield)return false;return true;});}
const fmt=n=>n?'£'+Number(n).toLocaleString():'—';
function tagCls(s){return{New:'tag-amber',Matched:'tag-gold',Distributed:'tag-blue',Viewing:'tag-green',Completed:'tag-muted',Active:'tag-green',Paused:'tag-amber','Do Not Contact':'tag-red',Confirmed:'tag-green',Pending:'tag-amber','Slots Requested':'tag-muted'}[s]||'tag-muted';}
function fmtDate(d){if(!d)return{day:'—',mon:'—'};const dt=new Date(d);return{day:dt.getDate(),mon:dt.toLocaleString('default',{month:'short'}).toUpperCase()};}
function initials(name){return(name||'').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();}
function toast(msg,type='ok'){const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;document.getElementById('toast-wrap').appendChild(el);setTimeout(()=>el.remove(),3000);}
function closeModal(){const m=document.getElementById('modal-wrap');if(m)m.remove();}
function showModal(html){const d=document.createElement('div');d.id='modal-wrap';d.innerHTML='<div class="modal">'+html+'</div>';d.addEventListener('click',e=>{if(e.target===d)closeModal();});document.body.appendChild(d);}
function renderSidebar(){const newD=S.deals.filter(d=>d.status==='New').length;const pendV=S.viewings.filter(v=>v.status==='Pending').length;const nav=[{id:'dashboard',ico:'◈',lbl:'Dashboard'},{id:'deals',ico:'◉',lbl:'Deal Pipeline',badge:newD||null},{id:'form',ico:'✦',lbl:'Add New Deal'},{id:'investors',ico:'◎',lbl:'Investor DB'},{id:'matching',ico:'⟡',lbl:'Match & Distribute'},{id:'viewings',ico:'◷',lbl:'Viewing Scheduler',badge:pendV||null}];return'<div class="sidebar"><div class="logo"><div class="logo-text">PropMatch</div><div class="logo-sub">Network</div><div class="db-indicator"><div class="db-dot '+(S.dbLive?'live':'')+'"></div><div class="db-label '+(S.dbLive?'live':'')+'">'+( S.dbLive?'Supabase Live':'Connecting...')+'</div></div></div><nav class="nav">'+nav.map(n=>'<div class="nav-item '+(S.screen===n.id?'active':'')+'" onclick="nav(\''+n.id+'\')"><span class="nav-icon">'+n.ico+'</span>'+n.lbl+(n.badge?'<span class="nav-badge">'+n.badge+'</span>':'')+'</div>').join('')+'</nav><div class="sidebar-footer"><div class="user-pill"><div class="avatar">SA</div><div><div class="user-name">Snayder Andrade</div><div class="user-role">Property Source Group</div></div></div></div></div>';}
function renderDashboard(){const confirmed=S.viewings.filter(v=>v.status==='Confirmed').length;const pending=S.viewings.filter(v=>v.status==='Pending').length;const totalMatched=S.deals.reduce((a,d)=>a+(d.investors_matched||0),0);return'<div class="screen"><div class="topbar"><div><div class="page-title">Dashboard</div><div class="page-sub">'+S.investors.length+' investors · '+S.deals.length+' deals · Live</div></div><div class="topbar-right"><button class="btn btn-ghost" onclick="fetchAll()">↻</button><button class="btn btn-ghost" onclick="nav(\'investors\')">+ Investor</button><button class="btn btn-primary" onclick="nav(\'form\')">+ New Deal</button></div></div><div class="content"><div class="stats-grid"><div class="stat-card"><div class="stat-label">Active Deals</div><div class="stat-value">'+S.deals.length+'</div><div class="stat-sub up">Live from DB</div></div><div class="stat-card"><div class="stat-label">Investor Database</div><div class="stat-value">'+S.investors.length+'</div><div class="stat-sub up">Ready for matching</div></div><div class="stat-card"><div class="stat-label">Viewings Confirmed</div><div class="stat-value">'+confirmed+'</div><div class="stat-sub amber">'+pending+' pending</div></div><div class="stat-card"><div class="stat-label">Total Matched</div><div class="stat-value">'+totalMatched+'</div><div class="stat-sub up">Across all deals</div></div></div><div class="sec-header"><div class="sec-title">Deal Pipeline</div><button class="btn btn-ghost btn-sm" onclick="nav(\'deals\')">View all →</button></div><div class="pipeline">'+['New','Matched','Distributed','Viewing'].map(status=>'<div class="p-col"><div class="p-col-head"><span>'+status+'</span><span class="p-count">'+S.deals.filter(d=>d.status===status).length+'</span></div>'+S.deals.filter(d=>d.status===status).map(d=>'<div class="deal-chip"><div class="dc-title">'+d.title+'</div><div class="dc-meta">'+(d.location||'')+(d.country?', '+d.country:'')+'</div><div class="dc-price">'+fmt(d.price)+'</div></div>').join('')+'</div>').join('')+'</div>'+(S.viewings.length?'<div class="sec-header"><div class="sec-title">Upcoming Viewings</div><button class="btn btn-ghost btn-sm" onclick="nav(\'viewings\')">View all →</button></div><div class="card"><div class="card-body" style="padding:12px 16px">'+S.viewings.slice(0,3).map(v=>{const{day,mon}=fmtDate(v.viewing_date);return'<div class="viewing-card"><div class="vdate"><div class="vday">'+day+'</div><div class="vmon">'+mon+'</div></div><div class="vinfo"><div class="vtitle">'+v.deal_title+'</div><div class="vsub">'+v.investor_name+' · '+(v.viewing_time||'')+'</div></div><span class="tag '+tagCls(v.status)+'">'+v.status+'</span></div>';}).join('')+'</div></div>':'')+'</div></div>';}
function renderDeals(){return'<div class="screen"><div class="topbar"><div><div class="page-title">Deal Pipeline</div><div class="page-sub">'+S.deals.length+' deals</div></div><div class="topbar-right"><button class="btn btn-ghost" onclick="fetchAll()">↻ Refresh</button><button class="btn btn-primary" onclick="nav(\'form\')">+ New Deal</button></div></div><div class="content">'+(S.deals.length===0?'<div class="card"><div class="empty"><div class="ico">◉</div><p>No deals yet.</p><br/><button class="btn btn-primary" onclick="nav(\'form\')">+ Add Deal</button></div></div>':'<div class="card"><table class="table"><thead><tr><th>Deal</th><th>Type</th><th>Location</th><th>Price</th><th>Yield</th><th>Stage</th><th>Status</th><th>Matched</th><th></th></tr></thead><tbody>'+S.deals.map(d=>'<tr><td style="font-weight:600">'+d.title+'</td><td><span class="tag tag-blue">'+(d.asset_type||'—')+'</span></td><td style="color:var(--text2);font-size:12px">'+(d.location||'')+(d.country?', '+d.country:'')+'</td><td style="font-family:\'DM Mono\',monospace;color:var(--gold);font-size:12px">'+fmt(d.price)+'</td><td style="color:var(--green);font-weight:600">'+(d.expected_yield||0)+'%</td><td><span class="tag tag-muted">'+(d.deal_stage||'—')+'</span></td><td><span class="tag '+tagCls(d.status)+'">'+d.status+'</span></td><td style="text-align:center;font-weight:700">'+(d.investors_matched||0)+'</td><td style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="nav(\'matching\')">Match</button><button class="btn btn-danger btn-sm" onclick="if(confirm(\'Delete?\'))deleteDeal(\''+d.id+'\')">✕</button></td></tr>').join('')+'</tbody></table></div>')+'</div></div>';}
function renderForm(){const d=S.newDeal;const m=S.matchResult;return'<div class="screen"><div class="topbar"><div><div class="page-title">Add New Deal</div><div class="page-sub">Saved to Supabase</div></div></div><div class="content"><div style="display:grid;grid-template-columns:1fr 360px;gap:20px"><div><div class="card" style="margin-bottom:16px"><div class="card-head">Deal Details</div><div class="card-body"><div class="form-grid"><div class="fg full"><label class="fl">Deal Title *</label><input class="fi" id="f-title" placeholder="e.g. Florence Hotel Portfolio" value="'+d.title+'"/></div><div class="fg"><label class="fl">Asset Type</label><select class="fi" id="f-type"><option value="">Select</option>'+['Residential','Hospitality','Commercial','Mixed-Use','Land','PBSA','BTR'].map(t=>'<option '+(d.asset_type===t?'selected':'')+'>'+t+'</option>').join('')+'</select></div><div class="fg"><label class="fl">Deal Stage</label><select class="fi" id="f-stage"><option value="">Select</option>'+['Off-Market','Exclusive','Under Offer','Open Market'].map(t=>'<option '+(d.deal_stage===t?'selected':'')+'>'+t+'</option>').join('')+'</select></div><div class="fg"><label class="fl">City</label><input class="fi" id="f-loc" placeholder="e.g. Florence" value="'+d.location+'"/></div><div class="fg"><label class="fl">Country</label><select class="fi" id="f-country"><option value="">Select</option>'+['UK','Italy','Germany','Spain','Portugal','Switzerland','Europe','Ireland'].map(t=>'<option '+(d.country===t?'selected':'')+'>'+t+'</option>').join('')+'</select></div></div></div></div><div class="card" style="margin-bottom:16px"><div class="card-head">Financials</div><div class="card-body"><div class="form-grid-3"><div class="fg"><label class="fl">Price (£)</label><input class="fi" id="f-price" type="number" placeholder="4200000" value="'+d.price+'"/></div><div class="fg"><label class="fl">Yield (%)</label><input class="fi" id="f-yield" type="number" placeholder="6.2" value="'+d.expected_yield+'"/></div><div class="fg"><label class="fl">IRR (%)</label><input class="fi" id="f-irr" type="number" placeholder="22" value="'+d.target_irr+'"/></div><div class="fg"><label class="fl">Min Investment (£)</label><input class="fi" id="f-mininv" type="number" placeholder="500000" value="'+d.min_investment+'"/></div><div class="fg"><label class="fl">Finance</label><select class="fi" id="f-finance"><option value="">Select</option>'+['Cash','Bridging','Refinance','Structured','Flexible'].map(t=>'<option '+(d.finance_type===t?'selected':'')+'>'+t+'</option>').join('')+'</select></div></div></div></div><div class="card"><div class="card-head">Summary</div><div class="card-body"><div class="fg"><label class="fl">Executive Summary</label><textarea class="fi fi-ta" id="f-summary" placeholder="2-4 sentence overview...">'+d.summary+'</textarea></div><div style="display:flex;gap:10px;margin-top:14px"><button class="btn btn-primary" onclick="runMatchForm()">⟡ Match Investors</button><button class="btn btn-ghost" onclick="submitDeal()">Save to Supabase</button></div></div></div></div><div><div class="card"><div class="card-head">Live Match Preview</div><div class="card-body">'+(m===null?'<div class="empty" style="padding:32px 0"><div class="ico">⟡</div><p style="font-size:12px">Fill in deal details then click Match Investors</p></div>':'<div><div style="font-family:\'DM Serif Display\',serif;font-size:44px;color:var(--gold)">'+m.length+'</div><div style="color:var(--text2);font-size:13px">investors match</div><div class="progress-bar"><div class="progress-fill" style="width:'+(S.investors.length?Math.min(m.length/S.investors.length*100,100):0)+'%"></div></div><div style="font-size:11px;color:var(--text2);margin:6px 0 14px">'+S.investors.length+' total in database</div>'+(m.length===0?'<div style="color:var(--text2);font-size:12px;text-align:center;padding:12px">No matches.</div>':m.map(inv=>'<div class="match-row"><div><div style="font-weight:600;font-size:13px">'+inv.name+'</div><div style="font-size:11px;color:var(--text2)">'+(inv.investor_type||'')+'</div></div><span class="tag tag-green">✓</span></div>').join(''))+(m.length>0?'<button class="btn btn-primary" style="width:100%;margin-top:14px">✉ Distribute to '+m.length+'</button>':'')+'</div>')+'</div></div></div></div></div></div>';}
function readForm(){return{title:document.getElementById('f-title')?.value.trim()||'',asset_type:document.getElementById('f-type')?.value||'',deal_stage:document.getElementById('f-stage')?.value||'',location:document.getElementById('f-loc')?.value.trim()||'',country:document.getElementById('f-country')?.value||'',price:parseFloat(document.getElementById('f-price')?.value)||null,expected_yield:parseFloat(document.getElementById('f-yield')?.value)||null,target_irr:parseFloat(document.getElementById('f-irr')?.value)||null,min_investment:parseFloat(document.getElementById('f-mininv')?.value)||null,finance_type:document.getElementById('f-finance')?.value||'',summary:document.getElementById('f-summary')?.value.trim()||''};}
function runMatchForm(){S.matchResult=matchInvestors(readForm());render();}
async function submitDeal(){const deal=readForm();if(!deal.title){toast('Title required','err');return;}deal.status='New';deal.investors_matched=0;const r=await saveDeal(deal);if(r){S.newDeal={title:'',asset_type:'',location:'',country:'',price:'',min_investment:'',expected_yield:'',target_irr:'',deal_stage:'',finance_type:'',summary:''};S.matchResult=null;await fetchAll();S.screen='deals';render();}}
function renderInvestors(){return'<div class="screen"><div class="topbar"><div><div class="page-title">Investor Database</div><div class="page-sub">'+S.investors.length+' investors</div></div><div class="topbar-right"><button class="btn btn-ghost" onclick="fetchAll()">↻</button><button class="btn btn-primary" onclick="showAddInvestorModal()">+ Add Investor</button></div></div><div class="content">'+(S.investors.length===0?'<div class="card"><div class="empty"><div class="ico">◎</div><p>No investors yet.</p></div></div>':'<div class="card"><table class="table"><thead><tr><th>Name</th><th>Type</th><th>Assets</th><th>Geography</th><th>Ticket</th><th>Yield</th><th>Status</th><th></th></tr></thead><tbody>'+S.investors.map(inv=>{const assets=Array.isArray(inv.asset_preference)?inv.asset_preference:(inv.asset_preference||'').split(',').map(s=>s.trim()).filter(Boolean);const geos=Array.isArray(inv.geography)?inv.geography:(inv.geography||'').split(',').map(s=>s.trim()).filter(Boolean);return'<tr><td><div style="display:flex;align-items:center;gap:9px"><div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--accent));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">'+initials(inv.name)+'</div><div><div style="font-weight:600;font-size:13px">'+inv.name+'</div>'+(inv.email?'<div style="font-size:10px;color:var(--text2)">'+inv.email+'</div>':'')+'</div></div></td><td><span class="tag tag-blue" style="font-size:10px">'+(inv.investor_type||'—').split('/')[0].trim()+'</span></td><td style="font-size:11px;color:var(--text2)">'+assets.slice(0,2).join(', ')+'</td><td style="font-size:11px;color:var(--text2)">'+geos.slice(0,2).join(', ')+'</td><td style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--gold)">'+fmt(inv.min_investment)+(inv.max_investment?' – '+fmt(inv.max_investment):'')+'</td><td style="color:var(--green);font-weight:600">'+(inv.min_yield?inv.min_yield+'%+':'—')+'</td><td><span class="tag '+tagCls(inv.status)+'">'+inv.status+'</span></td><td><button class="btn btn-danger btn-sm" onclick="if(confirm(\'Remove?\'))deleteInvestor(\''+inv.id+'\')">✕</button></td></tr>';}).join('')+'</tbody></table></div>')+'</div></div>';}
function showAddInvestorModal(){showModal('<div class="modal-title">Add Investor</div><div class="form-grid" style="margin-bottom:14px"><div class="fg"><label class="fl">Full Name *</label><input class="fi" id="i-name" placeholder="James Whitmore"/></div><div class="fg"><label class="fl">Email</label><input class="fi" id="i-email" placeholder="james@fund.com"/></div><div class="fg"><label class="fl">Investor Type</label><select class="fi" id="i-type"><option value="">Select</option>'+['Family Office','Institutional Fund','UHNWI','HNW Individual','Private Investor','Developer','Fund / Private Equity','Operator / Hospitality'].map(t=>'<option>'+t+'</option>').join('')+'</select></div><div class="fg"><label class="fl">Status</label><select class="fi" id="i-status">'+['Active','Paused','Do Not Contact'].map(t=>'<option>'+t+'</option>').join('')+'</select></div><div class="fg"><label class="fl">Assets (comma sep)</label><input class="fi" id="i-assets" placeholder="Hospitality, Residential"/></div><div class="fg"><label class="fl">Geography (comma sep)</label><input class="fi" id="i-geo" placeholder="UK, Italy"/></div><div class="fg"><label class="fl">Min Investment (£)</label><input class="fi" id="i-min" type="number" placeholder="500000"/></div><div class="fg"><label class="fl">Max Investment (£)</label><input class="fi" id="i-max" type="number" placeholder="5000000"/></div><div class="fg"><label class="fl">Min Yield (%)</label><input class="fi" id="i-yield" type="number" placeholder="5"/></div><div class="fg"><label class="fl">Min IRR (%)</label><input class="fi" id="i-irr" type="number" placeholder="15"/></div><div class="fg full"><label class="fl">Notes</label><textarea class="fi fi-ta" id="i-notes" placeholder="Relationship notes..."></textarea></div></div><div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="submitInvestor()">Save</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>');}
async function submitInvestor(){const name=document.getElementById('i-name').value.trim();if(!name){toast('Name required','err');return;}const inv={name,email:document.getElementById('i-email').value.trim(),investor_type:document.getElementById('i-type').value,status:document.getElementById('i-status').value,asset_preference:document.getElementById('i-assets').value.split(',').map(s=>s.trim()).filter(Boolean),geography:document.getElementById('i-geo').value.split(',').map(s=>s.trim()).filter(Boolean),min_investment:parseFloat(document.getElementById('i-min').value)||null,max_investment:parseFloat(document.getElementById('i-max').value)||null,min_yield:parseFloat(document.getElementById('i-yield').value)||null,min_irr:parseFloat(document.getElementById('i-irr').value)||null,notes:document.getElementById('i-notes').value.trim()};closeModal();await saveInvestor(inv);await fetchAll();render();}
function renderMatching(){return'<div class="screen"><div class="topbar"><div><div class="page-title">Match & Distribute</div><div class="page-sub">Select a deal to match against '+S.investors.length+' investors</div></div></div><div class="content"><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px"><div><div class="sec-header"><div class="sec-title">Select Deal</div></div>'+(S.deals.length===0?'<div class="card"><div class="empty"><div class="ico">◉</div><p>No deals yet.</p></div></div>':S.deals.map(d=>'<div class="deal-chip" style="margin-bottom:10px" onclick="runMatchDeal(\''+d.id+'\')"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="dc-title" style="font-size:14px">'+d.title+'</div><div class="dc-meta">'+(d.asset_type||'')+' · '+(d.location||'')+(d.country?', '+d.country:'')+'</div><div class="dc-price">'+fmt(d.price)+' · '+(d.expected_yield||0)+'% yield</div></div><span class="tag '+tagCls(d.status)+'">'+d.status+'</span></div></div>').join(''))+'</div><div><div class="sec-header"><div class="sec-title">Results</div></div><div class="card"><div class="card-body" id="match-panel"><div class="empty" style="padding:36px 0"><div class="ico">←</div><p style="font-size:12px">Select a deal</p></div></div></div></div></div></div></div>';}
function runMatchDeal(id){const deal=S.deals.find(d=>d.id===id);if(!deal)return;const matched=matchInvestors(deal);const panel=document.getElementById('match-panel');if(!panel)return;panel.innerHTML='<div><div style="font-size:12px;color:var(--text2);margin-bottom:10px">Matching: <strong style="color:var(--text)">'+deal.title+'</strong></div><div style="font-family:\'DM Serif Display\',serif;font-size:44px;color:var(--gold)">'+matched.length+'</div><div style="color:var(--text2);font-size:13px">investors match</div><div class="progress-bar"><div class="progress-fill" style="width:'+(S.investors.length?Math.min(matched.length/S.investors.length*100,100):0)+'%"></div></div><div style="font-size:11px;color:var(--text2);margin:6px 0 14px">'+S.investors.length+' total</div>'+(matched.length===0?'<div style="color:var(--text2);font-size:12px;text-align:center;padding:10px">No matches.</div>':matched.map(inv=>'<div class="match-row"><div><div style="font-weight:600;font-size:13px">'+inv.name+'</div><div style="font-size:11px;color:var(--text2)">'+(inv.investor_type||'')+'</div></div><span class="tag tag-green">✓</span></div>').join(''))+(matched.length>0?'<button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="distributeNow(\''+id+'\','+matched.length+')">✉ Distribute to '+matched.length+' Investors</button>':'')+'</div>';}
async function distributeNow(dealId,count){await updateDealStatus(dealId,'Distributed',count);toast('✉ Distributed to '+count+' investors','ok');const btn=document.querySelector('#match-panel .btn-primary');if(btn){btn.textContent='✓ Distributed';btn.disabled=true;}}
function renderViewings(){const cols=[{lbl:'Slots Requested',statuses:['Slots Requested']},{lbl:'Pending',statuses:['Pending']},{lbl:'Confirmed',statuses:['Confirmed']}];return'<div class="screen"><div class="topbar"><div><div class="page-title">Viewing Scheduler</div><div class="page-sub">'+S.viewings.length+' viewings</div></div><div class="topbar-right"><button class="btn btn-ghost" onclick="fetchAll()">↻</button><button class="btn btn-primary" onclick="showViewingModal()">+ Schedule Viewing</button></div></div><div class="content"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px">'+cols.map(col=>'<div><div class="sec-header" style="margin-bottom:10px"><div class="sec-title" style="font-size:14px">'+col.lbl+'</div><span class="nav-badge">'+S.viewings.filter(v=>col.statuses.includes(v.status)).length+'</span></div>'+S.viewings.filter(v=>col.statuses.includes(v.status)).map(v=>{const{day,mon}=fmtDate(v.viewing_date);return'<div class="viewing-card" style="flex-direction:column;align-items:flex-start;margin-bottom:9px"><div style="display:flex;align-items:center;gap:12px;width:100%"><div class="vdate" style="background:'+(v.status==='Confirmed'?'var(--green)':v.status==='Pending'?'var(--amber)':'var(--border)')+'"><div class="vday">'+day+'</div><div class="vmon">'+mon+'</div></div><div class="vinfo"><div class="vtitle">'+v.deal_title+'</div><div class="vsub">'+v.investor_name+'</div><div class="vsub">'+(v.viewing_time||'')+'</div></div></div><div style="margin-top:9px;display:flex;gap:7px">'+(v.status==='Pending'?'<button class="btn btn-primary btn-sm" onclick="updateViewing(\''+v.id+'\',\'Confirmed\')">Confirm</button>':'')+(v.status==='Slots Requested'?'<button class="btn btn-ghost btn-sm" onclick="updateViewing(\''+v.id+'\',\'Pending\')">Slots Received</button>':'')+'</div></div>';}).join('')+'</div>').join('')+'</div><div class="sec-header"><div class="sec-title">Automation Flow</div></div><div class="card"><div class="card-body"><div class="flow"><div class="f-step done">Deal Distributed</div><div class="f-arrow">→</div><div class="f-step done">Investor Replies YES</div><div class="f-arrow">→</div><div class="f-step done">Team Notified</div><div class="f-arrow">→</div><div class="f-step active">3 Slots Requested</div><div class="f-arrow">→</div><div class="f-step">Confirmed</div></div></div></div></div></div>';}
function showViewingModal(){showModal('<div class="modal-title">Schedule Viewing</div><div class="form-grid" style="margin-bottom:14px"><div class="fg"><label class="fl">Deal</label><select class="fi" id="v-deal"><option value="">Select deal</option>'+S.deals.map(d=>'<option>'+d.title+'</option>').join('')+'</select></div><div class="fg"><label class="fl">Investor</label><select class="fi" id="v-inv"><option value="">Select investor</option>'+S.investors.map(i=>'<option>'+i.name+'</option>').join('')+'</select></div><div class="fg"><label class="fl">Date</label><input class="fi" id="v-date" type="date"/></div><div class="fg"><label class="fl">Time</label><input class="fi" id="v-time" type="time" value="10:00"/></div><div class="fg full"><label class="fl">Notes</label><input class="fi" id="v-notes" placeholder="Any notes"/></div></div><div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="submitViewing()">Schedule</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>');}
async function submitViewing(){const deal_title=document.getElementById('v-deal').value;const investor_name=document.getElementById('v-inv').value;const viewing_date=document.getElementById('v-date').value;if(!deal_title||!investor_name||!viewing_date){toast('Fill all fields','err');return;}closeModal();await saveViewing({deal_title,investor_name,viewing_date,viewing_time:document.getElementById('v-time').value,notes:document.getElementById('v-notes').value,status:'Pending'});await fetchAll();render();}
function nav(screen){S.screen=screen;S.matchResult=null;render();}
function render(){const screens={dashboard:renderDashboard,deals:renderDeals,form:renderForm,investors:renderInvestors,matching:renderMatching,viewings:renderViewings};const content=S.loading?'<div class="main"><div class="loading-screen"><div class="spinner"></div><div>Loading from Supabase...</div></div></div>':'<div class="main">'+(screens[S.screen]||renderDashboard)()+'</div>';document.getElementById('app').innerHTML=renderSidebar()+content;}
render();fetchAll();
</script>
</body>
</html>
