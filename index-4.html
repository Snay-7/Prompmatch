<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PropMatch Network</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0B1728;--navy2:#152238;--blue:#1A4F8A;--accent:#2D7DD2;
  --gold:#C9A84C;--gold2:#E8C96E;--green:#1A7A4A;--green-light:#E8F5EE;
  --red:#C0392B;--red-light:#FDECEA;--amber:#D35400;--amber-light:#FEF3E8;
  --purple:#6C3D8A;--purple-light:#F0E6F6;
  --border:#2A3A52;--card:#13203A;--text:#E8EDF5;--text2:#9AAFC8;
}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--navy2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px}
.auth-logo{font-family:'DM Serif Display',serif;font-size:28px;color:var(--gold);margin-bottom:4px}
.auth-sub{font-size:12px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.auth-tabs{display:flex;gap:4px;background:var(--navy);border-radius:10px;padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.15s}
.auth-tab.active{background:var(--card);color:var(--text)}
.auth-role-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.role-card{background:var(--navy);border:2px solid var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all 0.15s}
.role-card:hover{border-color:var(--accent)}
.role-card.selected{border-color:var(--gold);background:#C9A84C12}
.role-icon{font-size:24px;margin-bottom:6px}
.role-label{font-size:13px;font-weight:600;color:var(--text)}
.role-desc{font-size:11px;color:var(--text2);margin-top:2px}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto;transition:transform 0.25s ease}
.main{margin-left:240px;flex:1;min-height:100vh}
.sidebar-overlay{display:none;position:fixed;inset:0;background:#000000aa;z-index:150}
.logo{padding:20px 20px 14px;border-bottom:1px solid var(--border)}
.logo-text{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold)}
.logo-sub{font-size:9px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.db-dot.live{background:var(--green);animation:pulse 2s infinite}
.db-status{font-size:10px;color:var(--amber);margin-top:6px;display:flex;align-items:center}
.db-status.live{color:var(--green)}
.nav{padding:12px 10px;flex:1}
.nav-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);padding:10px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.15s;margin-bottom:1px}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,#1A4F8A22,#2D7DD222);color:var(--gold);border:1px solid #2D7DD230}
.nav-icon{font-size:14px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.avatar.agent{background:linear-gradient(135deg,var(--blue),var(--accent))}
.avatar.investor{background:linear-gradient(135deg,var(--green),#2ECC71)}
.avatar.admin{background:linear-gradient(135deg,var(--purple),#9B59B6)}
.user-name{font-size:12px;font-weight:600}
.user-role-badge{font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:20px;margin-top:1px;display:inline-block}
.role-agent{background:#1A4F8A22;color:#5B9FE0}
.role-investor{background:#1A7A4A22;color:#52BE80}
.role-admin{background:#6C3D8A22;color:#AF7AC5}

/* TOPBAR */
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.menu-btn{display:none;background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer}
.page-title{font-family:'DM Serif Display',serif;font-size:18px}
.page-sub{font-size:11px;color:var(--text2);margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--blue));color:#fff}
.btn-primary:hover{opacity:0.9}.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{opacity:0.9}
.btn-danger{background:transparent;color:var(--red);border:1px solid #C0392B44}
.btn-danger:hover{background:var(--red-light)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#B8900A);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}

/* CONTENT */
.content{padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.stat-value{font-family:'DM Serif Display',serif;font-size:28px;line-height:1}
.stat-sub{font-size:11px;margin-top:6px;padding:2px 8px;border-radius:20px;display:inline-block}
.stat-sub.up{background:var(--green-light);color:var(--green)}
.stat-sub.amber{background:var(--amber-light);color:var(--amber)}
.stat-sub.purple{background:var(--purple-light);color:var(--purple)}

/* CARDS */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'DM Serif Display',serif;font-size:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{padding:13px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px}
.table-wrap{overflow-x:auto}
.table{width:100%;border-collapse:collapse;min-width:500px}
.table th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
.table td{padding:10px 12px;border-bottom:1px solid #1E2F48;font-size:13px;vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:#ffffff04}

/* TAGS */
.tag{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-blue{background:#1A4F8A22;color:#5B9FE0;border:1px solid #1A4F8A44}
.tag-green{background:var(--green-light);color:var(--green)}
.tag-amber{background:var(--amber-light);color:var(--amber)}
.tag-gold{background:#C9A84C18;color:var(--gold2);border:1px solid #C9A84C33}
.tag-muted{background:#ffffff0f;color:var(--text2)}
.tag-red{background:var(--red-light);color:var(--red)}
.tag-purple{background:var(--purple-light);color:var(--purple)}

/* PIPELINE */
.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.p-col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.p-col-head{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.p-count{background:var(--navy2);font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px}
.deal-chip{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:all 0.15s}
.deal-chip:hover{border-color:var(--accent)}
.dc-title{font-size:12px;font-weight:600;margin-bottom:3px}
.dc-meta{font-size:11px;color:var(--text2)}
.dc-price{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold);margin-top:4px}

/* MARKETPLACE */
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.market-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all 0.2s;cursor:pointer}
.market-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.market-card-header{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.market-badge{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.market-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text);margin-bottom:4px}
.market-location{font-size:12px;color:var(--text2)}
.market-card-body{padding:14px 16px}
.market-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.metric{text-align:center;background:var(--navy2);border-radius:8px;padding:10px 6px}
.metric-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:3px}
.metric-value{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text)}
.metric-value.green{color:var(--green)}
.metric-value.gold{color:var(--gold)}
.market-card-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.match-pill{background:var(--green-light);color:var(--green);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.no-match-pill{background:#ffffff0f;color:var(--text2);font-size:11px;padding:3px 10px;border-radius:20px}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}.fg.full{grid-column:1/-1}
.fl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);font-weight:500}
.fi{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;width:100%}
.fi:focus{border-color:var(--accent)}.fi option{background:var(--navy2)}.fi-ta{resize:vertical;min-height:75px}

/* MATCH ROW */
.match-row{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:7px;cursor:pointer;transition:all 0.15s}
.match-row:hover{border-color:var(--accent)}
.match-row.selected{border-color:var(--green);background:#1A7A4A15}
.match-checkbox{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0}

/* VIEWINGS */
.viewing-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.vdate{border-radius:8px;padding:7px 10px;text-align:center;min-width:46px}
.vday{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;line-height:1}
.vmon{font-size:9px;color:#ffffffaa;text-transform:uppercase;letter-spacing:1px}
.vinfo{flex:1;min-width:0}
.vtitle{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vsub{font-size:11px;color:var(--text2)}

/* NOTIFICATION */
.notif-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px}
.notif-dot.read{background:var(--border)}
.notif-title{font-size:13px;font-weight:600;margin-bottom:3px}
.notif-meta{font-size:11px;color:var(--text2)}

/* MISC */
.progress-bar{height:4px;background:#ffffff10;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.toggle-wrap{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--navy2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.toggle{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform 0.2s}
.toggle.on::after{transform:translateX(16px)}
.send-log{background:var(--navy);border:1px solid var(--border);border-radius:8px;padding:12px;height:150px;overflow-y:auto;font-family:'DM Mono',monospace;font-size:11px;margin-top:10px}
.send-log-line{margin-bottom:3px;line-height:1.5}
.send-log-line.ok{color:#4CAF81}.send-log-line.err{color:#E57373}.send-log-line.info{color:var(--accent)}
.select-all-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--navy);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-size:12px;color:var(--text2)}
.profile-hero{background:linear-gradient(135deg,var(--navy2),var(--card));border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.profile-avatar-lg{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.screen{animation:fadeIn 0.2s ease}
.empty{text-align:center;padding:36px;color:var(--text2)}
.empty .ico{font-size:32px;margin-bottom:10px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:var(--text2)}

#toast-wrap{position:fixed;bottom:20px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;animation:fadeIn 0.2s ease;max-width:300px}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--accent);color:var(--accent)}

#modal-wrap{position:fixed;inset:0;background:#000000cc;z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:14px 14px 0 0;padding:24px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:18px}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy2);border-top:1px solid var(--border);z-index:190;padding:8px 0}
.bottom-nav-items{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;cursor:pointer;color:var(--text2);font-size:10px;font-weight:500;min-width:48px}
.bn-item.active{color:var(--gold)}.bn-icon{font-size:18px}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}.main{margin-left:0;padding-bottom:70px}
  .menu-btn{display:block}.stats-grid{grid-template-columns:1fr 1fr}
  .pipeline{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}
  .form-grid-3{grid-template-columns:1fr 1fr}.market-grid{grid-template-columns:1fr}
  .bottom-nav{display:block}.topbar-right .btn-ghost:not(.keep){display:none}
  .modal{border-radius:14px 14px 0 0;max-height:88vh}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr 1fr}.content{padding:14px}.topbar{padding:0 14px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div id="root"></div>
<div id="toast-wrap"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const SB_URL='https://ntjifzhrhazybrqozkih.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50amlmemhyaGF6eWJycW96a2loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjg0NjYsImV4cCI6MjA4OTg0NDQ2Nn0.nA0WOhuBnA4yBz2Dz61ByjCK8xf_v3WVWpOvwZX-YoQ';
const FROM_EMAIL='deals@propmatch.network';
const REPLY_TO='snayder@nestseekers.com';
const sb=supabase.createClient(SB_URL,SB_KEY);

// ── STATE ─────────────────────────────────────────────────────────
const S={
  user:null,profile:null,screen:'dashboard',
  deals:[],investors:[],viewings:[],marketDeals:[],matches:[],
  matchResult:null,loading:true,dbLive:false,
  selectedInvestorIds:new Set(),currentMatchDeal:null,currentMatched:[],
  newDeal:{title:'',asset_type:'',location:'',country:'',price:'',expected_yield:'',target_irr:'',deal_stage:'',finance_type:'',summary:'',listed_on_marketplace:false,marketplace_title:'',marketplace_summary:''},
};

// ── AUTH ──────────────────────────────────────────────────────────
function openSidebar(){document.querySelector('.sidebar')?.classList.add('open');document.getElementById('overlay').classList.add('open');}
function closeSidebar(){document.querySelector('.sidebar')?.classList.remove('open');document.getElementById('overlay').classList.remove('open');}

async function signIn(email,password){
  const{data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){toast(error.message,'err');return;}
  S.user=data.user;
  await loadProfile();
  await loadAll();
}

async function signUp(email,password,fullName,role){
  const{data,error}=await sb.auth.signUp({email,password,options:{data:{full_name:fullName,role}}});
  if(error){toast(error.message,'err');return;}
  toast('Account created! Please sign in.','ok');
  // Switch to sign in tab
  renderAuth('signin');
}

async function signOut(){
  await sb.auth.signOut();
  S.user=null;S.profile=null;S.screen='dashboard';
  render();
}

async function loadProfile(){
  if(!S.user)return;
  const{data}=await sb.from('profiles').select('*').eq('id',S.user.id).single();
  S.profile=data;
}

// ── DATA ──────────────────────────────────────────────────────────
async function loadAll(){
  S.loading=true;render();
  try{
    if(S.profile?.role==='agent'||S.profile?.role==='admin'){
      const[d,i,v]=await Promise.all([
        sb.from('deals').select('*').order('created_at',{ascending:false}),
        sb.from('investors').select('*').order('created_at',{ascending:false}),
        sb.from('viewings').select('*').order('viewing_date',{ascending:true}),
      ]);
      S.deals=d.data||[];S.investors=i.data||[];S.viewings=v.data||[];
    }
    if(S.profile?.role==='investor'||S.profile?.role==='admin'){
      const{data:md}=await sb.from('deals').select('*').eq('listed_on_marketplace',true).order('created_at',{ascending:false});
      S.marketDeals=md||[];
      const{data:mx}=await sb.from('marketplace_matches').select('*').order('created_at',{ascending:false});
      S.matches=mx||[];
    }
    if(S.profile?.role==='admin'){
      const{data:md}=await sb.from('deals').select('*').eq('listed_on_marketplace',true).order('created_at',{ascending:false});
      S.marketDeals=md||[];

// ── MATCHING ──────────────────────────────────────────────────────
function matchInvestors(deal){
  return S.investors.filter(inv=>{
    if(inv.status!=='Active')return false;
    const assets=Array.isArray(inv.asset_preference)?inv.asset_preference:(inv.asset_preference||'').split(',').map(s=>s.trim()).filter(Boolean);
    const geos=Array.isArray(inv.geography)?inv.geography:(inv.geography||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(deal.asset_type&&assets.length&&!assets.some(a=>a.toLowerCase().includes(deal.asset_type.toLowerCase())||deal.asset_type.toLowerCase().includes(a.toLowerCase())))return false;
    if(deal.country&&geos.length&&!geos.some(g=>g.toLowerCase().includes(deal.country.toLowerCase())||deal.country.toLowerCase().includes(g.toLowerCase())))return false;
    const price=parseFloat(deal.price)||0;
    if(price&&inv.min_investment&&price<inv.min_investment)return false;
    if(price&&inv.max_investment&&price>inv.max_investment)return false;
    const yld=parseFloat(deal.expected_yield)||0;
    if(yld&&inv.min_yield&&yld<inv.min_yield)return false;
    return true;
  });
}

function matchesProfile(deal,profile){
  if(!profile)return false;
  const assets=Array.isArray(profile.asset_preference)?profile.asset_preference:(profile.asset_preference||'').split(',').map(s=>s.trim()).filter(Boolean);
  const geos=Array.isArray(profile.geography)?profile.geography:(profile.geography||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(deal.asset_type&&assets.length&&!assets.some(a=>a.toLowerCase().includes(deal.asset_type.toLowerCase())||deal.asset_type.toLowerCase().includes(a.toLowerCase())))return false;
  if(deal.country&&geos.length&&!geos.some(g=>g.toLowerCase().includes(deal.country.toLowerCase())||deal.country.toLowerCase().includes(g.toLowerCase())))return false;
  const price=parseFloat(deal.price)||0;
  if(price&&profile.min_investment&&price<profile.min_investment)return false;
  if(price&&profile.max_investment&&price>profile.max_investment)return false;
  return true;
}

async function sendViaEdgeFunction(to,name,subject,html){
  const{data:{session}}=await sb.auth.getSession();
  const res=await fetch(SB_URL+'/functions/v1/send-email',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?.access_token||SB_KEY)},
    body:JSON.stringify({to,name,subject,html})
  });
  const d=await res.json();
  if(!res.ok)throw new Error(d.error||'Send failed');
  return d;
}

async function distributeEmails(dealId,selected){
  const deal=S.deals.find(d=>d.id===dealId);if(!deal)return;
  showModal(`<div class="modal-title">✉ Sending Deal Alert</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:4px">Deal: <strong style="color:var(--text)">${deal.title}</strong></div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px">Sending to ${selected.length} investors from ${FROM_EMAIL}</div>
    <div><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span id="spl">Preparing...</span><span id="spp">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="sp" style="width:0%"></div></div></div>
    <div class="send-log" id="sl"></div>
    <div style="margin-top:14px"><button class="btn btn-ghost" id="cls-btn" onclick="closeModal();loadAll()" disabled>Close</button></div>`);
  function log(msg,type='info'){const el=document.getElementById('sl');if(!el)return;const d=document.createElement('div');d.className='send-log-line '+type;d.textContent='['+new Date().toLocaleTimeString()+'] '+msg;el.appendChild(d);el.scrollTop=el.scrollHeight;}
  let sent=0,failed=0;
  log('Starting send to '+selected.length+' investors...','info');
  for(let i=0;i<selected.length;i++){
    const inv=selected[i];
    if(!inv.email){log('⚠ Skipped '+inv.name+' — no email','err');failed++;}
    else{
      try{
        await sendViaEdgeFunction(inv.email,inv.name,'New Deal Alert — '+deal.title+(deal.location?' | '+deal.location:''),buildEmailHTML(deal,inv));
        sent++;log('✓ Sent to '+inv.name,'ok');
      }catch(e){failed++;log('✗ Failed '+inv.name+': '+e.message,'err');}
    }
    const pct=Math.round(((i+1)/selected.length)*100);
    const sp=document.getElementById('sp');const spp=document.getElementById('spp');const spl=document.getElementById('spl');
    if(sp)sp.style.width=pct+'%';if(spp)spp.textContent=pct+'%';if(spl)spl.textContent=(i+1)+' of '+selected.length;
    await new Promise(r=>setTimeout(r,300));
  }
  log('Done. '+sent+' sent, '+failed+' failed.',sent>0?'ok':'err');
  const cb=document.getElementById('cls-btn');if(cb)cb.disabled=false;
  if(sent>0)await updateDealStatus(dealId,'Distributed',sent);
  toast('✉ '+sent+' emails sent','ok');
}

function readDealForm(){return{
  title:document.getElementById('f-title')?.value.trim()||'',

  deal_stage:document.getElementById('f-stage')?.value||'',

  country:document.getElementById('f-country')?.value||'',

function runMatchForm(){S.matchResult=matchInvestors(readDealForm());S.currentMatched=S.matchResult;S.selectedInvestorIds=new Set(S.matchResult.filter(i=>i.email).map(i=>i.id));S.currentMatchDeal=null;render();}

async function submitDeal(){
  const deal=readDealForm();
  if(!deal.title){toast('Title required','err');return;}
  deal.status='New';deal.investors_matched=0;
  const r=await saveDeal(deal);
  if(r){S.newDeal={title:'',asset_type:'',location:'',country:'',price:'',expected_yield:'',target_irr:'',deal_stage:'',finance_type:'',summary:'',listed_on_marketplace:false,marketplace_title:'',marketplace_summary:''};S.matchResult=null;await loadAll();S.screen='deals';render();}
}

function toggleRow(i,invId){const cb=document.getElementById('cb-'+i);const row=document.getElementById('mr-'+i);if(!cb||cb.disabled)return;cb.checked=!cb.checked;if(cb.checked){row.classList.add('selected');S.selectedInvestorIds.add(invId);}else{row.classList.remove('selected');S.selectedInvestorIds.delete(invId);}const sel=document.getElementById('sel-count');if(sel)sel.textContent=S.selectedInvestorIds.size+' selected';}
function toggleAll(checked){S.currentMatched.forEach((inv,i)=>{if(!inv.email)return;const cb=document.getElementById('cb-'+i);const row=document.getElementById('mr-'+i);if(!cb)return;cb.checked=checked;if(checked){row.classList.add('selected');S.selectedInvestorIds.add(inv.id);}else{row.classList.remove('selected');S.selectedInvestorIds.delete(inv.id);}});const sel=document.getElementById('sel-count');if(sel)sel.textContent=S.selectedInvestorIds.size+' selected';}
async function sendSelected(){if(S.selectedInvestorIds.size===0){toast('No investors selected','err');return;}const selected=S.currentMatched.filter(inv=>S.selectedInvestorIds.has(inv.id)&&inv.email);if(!S.currentMatchDeal){const deal=readDealForm();if(!deal.title){toast('Save or fill in deal title first','err');return;}deal.status='New';deal.investors_matched=0;const saved=await saveDeal(deal);if(!saved)return;await loadAll();S.currentMatchDeal=saved.id;}await distributeEmails(S.currentMatchDeal,selected);}

function runMatchDeal(id){
  const deal=S.deals.find(d=>d.id===id);if(!deal)return;
  const matched=matchInvestors(deal);
  S.currentMatchDeal=id;S.currentMatched=matched;
  S.selectedInvestorIds=new Set(matched.filter(i=>i.email).map(i=>i.id));
  const panel=document.getElementById('match-results');if(!panel)return;
  panel.innerHTML=`<div class="card" style="margin-top:16px"><div class="card-head"><span>${matched.length} investors match — ${deal.title}</span><span style="font-size:12px;color:var(--green)">${matched.filter(i=>i.email).length} with email</span></div><div class="card-body">
    ${matched.length===0?'<div class="empty" style="padding:20px"><div class="ico">🔍</div><p>No matches. Try adding more investors or check your criteria.</p></div>':`
    <div class="select-all-bar"><span id="sel-count-m">${matched.filter(i=>i.email).length} selected</span><div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="toggleAllMatch(true)">All</button><button class="btn btn-ghost btn-sm" onclick="toggleAllMatch(false)">None</button></div></div>
    ${matched.map((inv,i)=>`<div class="match-row ${inv.email?'selected':''}" id="mmr-${i}" onclick="toggleMatchRow(${i},'${inv.id}')"><input type="checkbox" class="match-checkbox" id="mcb-${i}" ${inv.email?'checked':''} ${!inv.email?'disabled':''} onclick="event.stopPropagation();toggleMatchRow(${i},'${inv.id}')"/><div style="flex:1"><div style="font-weight:600;font-size:13px">${inv.name}</div><div style="font-size:11px;color:var(--text2)">${inv.investor_type||''} · ${inv.email||'No email'}</div></div><span class="tag ${inv.email?'tag-green':'tag-amber'}">${inv.email?'✓ Email':'No email'}</span></div>`).join('')}
    <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="sendMatchSelected()">✉ Send to Selected</button>`}
  </div></div>`;
}

function toggleMatchRow(i,invId){const cb=document.getElementById('mcb-'+i);const row=document.getElementById('mmr-'+i);if(!cb||cb.disabled)return;cb.checked=!cb.checked;if(cb.checked){row.classList.add('selected');S.selectedInvestorIds.add(invId);}else{row.classList.remove('selected');S.selectedInvestorIds.delete(invId);}const sel=document.getElementById('sel-count-m');if(sel)sel.textContent=S.selectedInvestorIds.size+' selected';}
function toggleAllMatch(checked){S.currentMatched.forEach((inv,i)=>{if(!inv.email)return;const cb=document.getElementById('mcb-'+i);const row=document.getElementById('mmr-'+i);if(!cb)return;cb.checked=checked;if(checked){row.classList.add('selected');S.selectedInvestorIds.add(inv.id);}else{row.classList.remove('selected');S.selectedInvestorIds.delete(inv.id);}});const sel=document.getElementById('sel-count-m');if(sel)sel.textContent=S.selectedInvestorIds.size+' selected';}
async function sendMatchSelected(){if(S.selectedInvestorIds.size===0){toast('No investors selected','err');return;}const selected=S.currentMatched.filter(inv=>S.selectedInvestorIds.has(inv.id)&&inv.email);await distributeEmails(S.currentMatchDeal,selected);}

async function saveProfile(){
  const role=S.profile?.role;
  const updates={
    full_name:document.getElementById('p-name')?.value.trim(),
    company:document.getElementById('p-company')?.value.trim(),
    agency_name:document.getElementById('p-company')?.value.trim(),
    phone:document.getElementById('p-phone')?.value.trim(),
    linkedin_url:document.getElementById('p-linkedin')?.value.trim(),
  };
  if(role==='investor'){
    updates.investor_type=document.getElementById('p-itype')?.value;
    updates.asset_preference=document.getElementById('p-assets')?.value.split(',').map(s=>s.trim()).filter(Boolean);
    updates.geography=document.getElementById('p-geo')?.value.split(',').map(s=>s.trim()).filter(Boolean);
    updates.min_investment=parseFloat(document.getElementById('p-min')?.value)||null;
    updates.max_investment=parseFloat(document.getElementById('p-max')?.value)||null;
    updates.min_yield=parseFloat(document.getElementById('p-yield')?.value)||null;
    updates.min_irr=parseFloat(document.getElementById('p-irr')?.value)||null;
    updates.contact_email_public=document.getElementById('p-contact-email')?.value.trim();
  }
  await updateProfile(updates);
}

function showImportModal(){
  showModal(`<div class="modal-title">⬆ Import 32 Investors</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Imports all 32 investors into your private database.</p>
    <div><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span id="imp-lbl">Ready</span><span id="imp-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="imp-prog" style="width:0%"></div></div></div>
    <div class="send-log" id="imp-log"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-primary" id="imp-btn" onclick="runBulkImport()">▶ Import All 32</button>
      <button class="btn btn-ghost" id="imp-close" onclick="closeModal();loadAll();render()" disabled>Done</button>
    </div>`);

async function runBulkImport(){
  document.getElementById('imp-btn').disabled=true;
  function log(msg,type='info'){const el=document.getElementById('imp-log');if(!el)return;const d=document.createElement('div');d.className='send-log-line '+type;d.textContent='['+new Date().toLocaleTimeString()+'] '+msg;el.appendChild(d);el.scrollTop=el.scrollHeight;}
  let ok=0,fail=0;
  log('Importing '+INVESTORS_DATA.length+' investors...','info');
  for(let i=0;i<INVESTORS_DATA.length;i++){
    try{
      const{error}=await sb.from('investors').insert([{...INVESTORS_DATA[i],agent_id:S.user.id}]);
      if(error)throw error;ok++;log('✓ '+INVESTORS_DATA[i].name,'ok');
    }catch(e){fail++;log('✗ '+INVESTORS_DATA[i].name+': '+e.message,'err');}
    const pct=Math.round(((i+1)/INVESTORS_DATA.length)*100);
    const p=document.getElementById('imp-prog');const pp=document.getElementById('imp-pct');const pl=document.getElementById('imp-lbl');
    if(p)p.style.width=pct+'%';if(pp)pp.textContent=pct+'%';if(pl)pl.textContent=(i+1)+' of '+INVESTORS_DATA.length;
    await new Promise(r=>setTimeout(r,120));
  }
  log('Done. '+ok+' imported, '+fail+' failed.',ok>0?'ok':'err');
  const cb=document.getElementById('imp-close');if(cb)cb.disabled=false;
  toast(ok+' investors imported ✓','ok');
}

// ── MAIN RENDER ───────────────────────────────────────────────────
function render(){
  const role=S.profile?.role||'agent';
  if(!S.user){renderAuth();return;}
  if(S.loading){
    document.getElementById('root').innerHTML=`<div class="loading-screen"><div class="spinner"></div><div>Loading PropMatch...</div></div>`;
    return;
  }
  const screens={
    dashboard:renderDashboard,
    deals:renderDeals,
    'add-deal':renderAddDeal,
    investors:renderInvestors,
    matching:renderMatching,
    viewings:renderViewings,
    marketplace:renderMarketplace,
    'marketplace-agent':renderMarketplaceAgent,
    intros:renderIntros,
    'my-matches':renderMyMatches,
    profile:renderProfile,
  };
  const screenFn=screens[S.screen]||renderDashboard;
  document.getElementById('root').innerHTML=`
    <div class="app">
      ${renderSidebar()}
      <div class="main">
        ${screenFn()}
        ${renderBottomNav()}
      </div>
    </div>`;
  document.getElementById('overlay').onclick=closeSidebar;
}

// ── BOOT ──────────────────────────────────────────────────────────
(async()=>{
  render();
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    S.user=session.user;
    await loadProfile();
    await loadAll();
  } else {
    renderAuth();
  }
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){S.user=session.user;await loadProfile();await loadAll();}
    if(event==='SIGNED_OUT'){S.user=null;S.profile=null;renderAuth();}
  });
})();
</script>
